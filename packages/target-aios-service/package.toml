schema = "ailang.package-source.v1"
name = "target-aios-service"
version = "0.0.1-alpha.4"
types = ["target", "tool", "template"]

[targets.aios-service]
aliases = ["aios-headless"]
defaultRunner = "qemu"
artifactTypes = ["img", "initramfs", "oci"]
options = ["arch", "base-version", "boot", "image", "partition", "feature", "debug-console"]

[targets.aios-service.tools]
run = ["qemu-system-x86_64", "qemu-system-aarch64"]
publish = []
